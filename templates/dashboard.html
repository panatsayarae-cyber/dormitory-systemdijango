<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
    body {
        background: #f5f7fa;
    }
    .card {
        border-radius: 15px;
        box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }
</style>

</head>

<body>

<!-- 🔵 Navbar -->
<nav class="navbar navbar-dark bg-dark px-4">
    <span class="navbar-brand">🏠 ระบบหอพัก</span>

    <div class="d-flex align-items-center">
        <span class="text-white me-3">👤 {{ tenant.name }}</span>
        <a href="/logout/" class="btn btn-danger btn-sm">ออกจากระบบ</a>
    </div>
</nav>

<!-- 🔵 Content -->
<div class="container mt-4">

    <h4 class="mb-4">📊 Dashboard</h4>

    <div class="row">

        <!-- 🏠 ห้อง -->
        <div class="col-md-6 mb-3">
            <div class="card p-3">
                <h5>🏠 ข้อมูลห้อง</h5>
                <hr>
                <p><strong>เลขห้อง:</strong> {{ contract.room.room_number }}</p>
            </div>
        </div>

        <!-- 💸 บิล -->
        <div class="col-md-6 mb-3">
            <div class="card p-3">
                <h5>💸 บิลล่าสุด</h5>
                <hr>
                <p><strong>ยอดเงิน:</strong> {{ bill.total }} บาท</p>
                <p>
                    <strong>สถานะ:</strong>
                    <span class="badge bg-warning text-dark">{{ bill.status }}</span>
                </p>
            </div>
        </div>

    </div>

    <!-- 🔧 ปุ่ม -->
    <div class="text-center mt-4">
        <a href="/repair/" class="btn btn-warning btn-lg">
            🔧 แจ้งซ่อม
        </a>
        </div>
        <div class="text-center mt-4">
        <a href="/bills/" class="btn btn-primary mt-3">💸 ดูบิล</a>
        </a>
        </div>
    
</div>

</body>
</html>
